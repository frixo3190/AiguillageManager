<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contrôle du Réseau</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aiguillage">
    <link rel="apple-touch-icon" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="signal-indicator" class="signal-ok"><span class="signal-dot"></span><span class="signal-text">DCC OK</span></div>
    
    <button id="history-btn" class="btn btn-secondary">📜 Historique</button>

    <button id="mode-btn" class="btn btn-user">🔒 Mode Utilisateur</button>

    <div id="history-panel" class="hidden">
        <h3>Historique des actions</h3>
        <ul id="history-list">
            </ul>
    </div>

    <div id="admin-panel" class="hidden">
        <label for="bg-upload" class="btn btn-small btn-secondary">🖼️ Plan</label>
        <input type="file" id="bg-upload" accept="image/*" style="display: none;">
    </div>

    <div id="layout-map">
        </div>
    
    <div id="switches-container">
        </div>

    <div id="footer-frixo">Gestion aiguillage - By Frixo - v1.14</div>

    <div id="emergency-overlay" class="hidden">
        <div class="emergency-content">
            <div class="emergency-icon">⚠️</div>
            <div class="emergency-text">ARRÊT D'URGENCE</div>
            <div class="emergency-sub">Signal DCC d'urgence reçu</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
